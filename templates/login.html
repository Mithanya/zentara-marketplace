<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Zentara</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<nav class="navbar">
  <div class="container"><a class="navbar-brand" href="/">Zen<span>tara</span></a></div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} mt-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="auth-card">
    <h2 class="mb-1"><i class="bi bi-person-circle"></i> Welcome back</h2>
    <p style="color:var(--muted);font-size:.88rem;" class="mb-4">Sign in to your Zentara account</p>
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary-gold">Sign In <i class="bi bi-arrow-right"></i></button>
    </form>
    <hr class="divider" />
    <p style="color:var(--muted);font-size:.88rem;text-align:center;">
      Don't have an account? <a href="/register">Create one</a>
    </p>
    <p style="color:var(--muted);font-size:.78rem;text-align:center;margin-top:.5rem;">
      Admin? Use <code style="color:var(--gold)"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="0c6d686165624c766962786d7e6d226f6361">[email&#160;protected]</a></code> / <code style="color:var(--gold)">admin123</code>
    </p>
  </div>
</di
